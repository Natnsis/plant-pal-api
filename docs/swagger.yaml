basePath: /
definitions:
  gorm.DeletedAt:
    properties:
      time:
        type: string
      valid:
        description: Valid is true if Time is not NULL
        type: boolean
    type: object
  internals_auth.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  internals_auth.LogoutRequest:
    properties:
      refresh_token:
        type: string
    type: object
  internals_auth.RefreshRequest:
