  internals_handlers.UpdateCarePlanRequest:
    properties:
      humidity_requirement:
        type: string
      light_requirement:
        type: string
      watering_amount:
        type: string
      watering_frequency_days:
        type: integer
      watering_method:
        type: string
      watering_tips:
        type: string
    type: object
  internals_handlers.UpdateNotificationRequest:
    properties:
      daily_summary_enabled:
