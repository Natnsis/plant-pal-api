      default_snooze_duration_minute:
        type: integer
      notification_enabled:
        type: boolean
      preferred_notification_time:
        type: string
      sound_alert_enabled:
        type: boolean
      vibration_enabled:
        type: boolean
    type: object
  internals_handlers.UpdatePlantRequest:
    properties:
      health_score:
        type: integer
      location:
        type: string
      nickname:
        type: string
